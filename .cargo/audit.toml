# cargo-audit configuration
# https://rustsec.org/advisories/

[advisories]
ignore = [
    # paste is unmaintained but has no known security issues.
    # It's a transitive dependency of cel-interpreter used for CEL policy constraints.
    # TODO: Watch for cel-interpreter updates that remove paste dependency.
    "RUSTSEC-2024-0436",

    # rsa Marvin Attack (RUSTSEC-2023-0071) — no fix available upstream.
    # Transitive dependency via c2pa-rs. Not exploitable in our use case:
    # we use c2pa for content credential assertions, not RSA key operations.
    "RUSTSEC-2023-0071",

    # proc-macro-error unmaintained (RUSTSEC-2024-0370) — no security impact.
    # Transitive via c2pa-rs → iref → static-regular-grammar.
    "RUSTSEC-2024-0370",

    # tracing-subscriber ANSI escape (RUSTSEC-2025-0055) — transitive via
    # risc0-zkvm → ark-relations. Feature-gated behind `zkvm`, not in default build.
    "RUSTSEC-2025-0055",

    # bincode unmaintained (RUSTSEC-2025-0141) — transitive via risc0-zkvm.
    # Feature-gated, no security impact.
    "RUSTSEC-2025-0141",

    # derivative unmaintained (RUSTSEC-2024-0388) — transitive via
    # risc0-zkvm → ark-crypto-primitives. Feature-gated, no security impact.
    "RUSTSEC-2024-0388",

    # rand unsoundness via custom logger calling rand::rng() (Stacked Borrows).
    # Direct deps bumped to patched versions; remaining exposure is transitive
    # rand 0.8.5 via rust_decimal/ruint — upstream has no patched 0.8.x.
    # Not exploitable: no custom logger in these deps calls rand::rng().
    "RUSTSEC-2026-0097",

    # rustls-webpki 0.101.x URI name-constraint / wildcard-name vulns (2026-04-14).
    # Transitive via aws-smithy-http-client 1.1.12 → rustls 0.21 → rustls-webpki 0.101.
    # AWS SDK fix path: BehaviorVersion v2025_01_17+ (hyper 1.x + rustls 0.23).
    # Tracked separately; AWS path does not process attacker-controlled certs.
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
]

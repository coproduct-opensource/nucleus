name: Aeneas Verification

on:
  push:
    branches: ["main"]
    paths:
      - "crates/portcullis-core/**"
      - ".github/workflows/aeneas.yml"
  pull_request:
    paths:
      - "crates/portcullis-core/**"
      - ".github/workflows/aeneas.yml"
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

env:
  # Pin to the Aeneas build that generated the committed Lean code.
  # Update this when regenerating: run ./scripts/aeneas-translate.sh
  AENEAS_RELEASE: build-2026.03.29.102514-1180be60c7a0e642cb442bfe90fe5cd8c1bb853f
  # Charon needs a specific nightly for rustc-dev components
  CHARON_NIGHTLY: nightly-2026-02-07

jobs:
  aeneas-translate:
    name: Aeneas (Rust → Lean 4)
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # --- Rust nightly for Charon MIR extraction ---
      - name: Install Rust nightly for Charon
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ env.CHARON_NIGHTLY }}
          components: rustc-dev,llvm-tools-preview,rust-src

      # --- Download pre-built Aeneas + Charon (no OCaml build required) ---
      - name: Download Aeneas pre-built binaries
        run: |
          gh release download "$AENEAS_RELEASE" \
            --repo AeneasVerif/aeneas \
            --pattern "aeneas-linux-x86_64.tar.gz" \
            --dir /tmp
          mkdir -p /tmp/aeneas-bin
          tar xzf /tmp/aeneas-linux-x86_64.tar.gz -C /tmp/aeneas-bin
          echo "/tmp/aeneas-bin" >> "$GITHUB_PATH"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Verify tools
        run: |
          which charon && charon version
          which aeneas && aeneas -version

      # --- Extract + Translate ---
      - name: Charon MIR extraction
        working-directory: crates/portcullis-core
        run: charon cargo --preset aeneas

      - name: Aeneas Lean 4 translation
        run: |
          mkdir -p crates/portcullis-core/lean/ci-generated
          # Aeneas may emit warnings/errors for types it can't translate
          # (bool-field structs, Vec, String, etc.). The lattice core types
          # translate successfully. We capture the exit code and only run
          # the diff check if translation was clean.
          AENEAS_EXIT=0
          aeneas -backend lean -split-files portcullis_core.llbc \
            -dest crates/portcullis-core/lean/ci-generated || AENEAS_EXIT=$?
          echo "aeneas_exit=$AENEAS_EXIT" >> "$GITHUB_OUTPUT"
          if [ "$AENEAS_EXIT" -ne 0 ]; then
            echo "⚠ Aeneas exited with code $AENEAS_EXIT (partial translation)"
            echo "  This is expected — some portcullis-core types are not translatable."
            echo "  The diff check will be skipped."
          fi
        id: aeneas-translate

      # --- Verify generated code matches committed code ---
      # Only compares Aeneas-generated files (Types.lean, Funs.lean, FunsExternal_Template.lean).
      # CoreFuns.lean and FunsExternal.lean are curated subsets — not generated by Aeneas.
      - name: Verify generated Lean matches committed
        if: steps.aeneas-translate.outputs.aeneas_exit == '0'
        run: |
          MISMATCH=0
          for f in Types.lean Funs.lean FunsExternal_Template.lean; do
            if [ -f "crates/portcullis-core/lean/ci-generated/$f" ]; then
              # Aeneas generates into flat dir; committed code is in PortcullisCore/ subdir
              COMMITTED="crates/portcullis-core/lean/generated/$f"
              if [ ! -f "$COMMITTED" ]; then
                COMMITTED="crates/portcullis-core/lean/generated/PortcullisCore/$f"
              fi
              if [ -f "$COMMITTED" ] && ! diff -q "$COMMITTED" "crates/portcullis-core/lean/ci-generated/$f" > /dev/null 2>&1; then
                echo "MISMATCH: $f"
                diff "$COMMITTED" "crates/portcullis-core/lean/ci-generated/$f" || true
                MISMATCH=1
              fi
            fi
          done
          if [ "$MISMATCH" -eq 1 ]; then
            echo ""
            echo "ERROR: Aeneas-generated Lean code does not match committed version."
            echo "Run: ./scripts/aeneas-translate.sh"
            exit 1
          fi
          echo "✓ Generated Lean code matches committed version"

      # --- Verify proofs type-check ---
      - name: Install elan (Lean toolchain)
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --no-modify-path
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache Lake / Mathlib build artifacts
        uses: actions/cache@v5
        with:
          path: |
            crates/portcullis-core/lean/.lake
            ~/.elan
          key: lean-aeneas-${{ runner.os }}-${{ hashFiles('crates/portcullis-core/lean/lean-toolchain', 'crates/portcullis-core/lean/lakefile.lean') }}
          restore-keys: |
            lean-aeneas-${{ runner.os }}-

      - name: lake build (type-check proofs)
        working-directory: crates/portcullis-core/lean
        run: |
          lake build PortcullisCoreBridge
          lake build ExposureProofs
          lake build DecidePureProofs
          lake build DeclassifyProofs
          lake build FlowProofs
          lake build FlowGraphProofs
          lake build CompartmentProofs

      - name: Reject sorry (proof holes)
        working-directory: crates/portcullis-core/lean
        run: |
          if grep -rn 'sorry' PortcullisCoreBridge.lean ExposureProofs.lean DecidePureProofs.lean DeclassifyProofs.lean FlowProofs.lean FlowGraphProofs.lean CompartmentProofs.lean generated/PortcullisCore/FunsExternal.lean generated/PortcullisCore/CoreFuns.lean; then
            echo "ERROR: Lean proofs contain 'sorry' — proof has holes."
            exit 1
          fi
          echo "✓ No sorry found — all proofs complete"

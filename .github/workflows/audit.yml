name: Security Audit

on:
  push:
    branches: [main]
    paths:
      - Cargo.lock
      - Cargo.toml
      - crates/**/Cargo.toml
  pull_request:
  merge_group:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions-rust-lang/audit@72c09e02f132669d52284a3323acdb503cfc1a24 # v1
        with:
          denyWarnings: true

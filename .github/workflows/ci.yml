name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  merge_group:

permissions:
  contents: read

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          components: rustfmt
          cache: true
      - name: cargo fmt
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          components: clippy
          targets: wasm32-unknown-unknown
          cache: true
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build wasm SDK (vendored into verifier-service via include_bytes!)
        run: wasm-pack build sdks/verifier-js --target web --release
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          targets: wasm32-unknown-unknown
          cache: true
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build wasm SDK (vendored into verifier-service via include_bytes!)
        run: wasm-pack build sdks/verifier-js --target web --release
      - name: cargo test
        run: cargo test --all-features
      # Node tests run the WASM bindings against the cross-language golden seal
      # (settlement + commons) and the accept/reject smoke fixtures — per-PR, not
      # just on publish, so a binding-layer drift from the proven kernels is caught
      # here. Node is preinstalled on the ubuntu runner.
      - name: Node tests (golden seal + smoke) against built wasm
        working-directory: sdks/verifier-js
        run: npm test

  a2a-example:
    name: A2A example server (examples/a2a-server)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # examples/a2a-server is its own workspace (root Cargo.toml `exclude`), so
    # the root-level fmt/clippy/test jobs never touch it. This job is NOT
    # path-filtered on purpose: the example path-depends on
    # crates/nucleus-{agent-card,verify-commerce,envelope,lineage}, so a change
    # anywhere in those crates can break the example's receipt pre-image and
    # version-negotiation invariants without touching examples/**.
    defaults:
      run:
        working-directory: examples/a2a-server
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          components: rustfmt, clippy
          cache: true
          cache-workspaces: examples/a2a-server
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: cargo test
        run: cargo test --all-features

  owasp-gauntlet:
    name: OWASP LLM Security Gauntlet
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          cache: true
      - name: Run OWASP LLM Top 10 security tests
        run: cargo test -p portcullis --test owasp_llm_gauntlet --all-features

  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          toolchain: nightly
          cache: true
      - name: install cargo-fuzz
        # Pin version, but DROP --locked so cargo resolves a rustix newer
        # than the 0.36.5 cargo-fuzz bundles (0.36.5 uses rustc-internal
        # attributes that current nightly rejects). Every cargo-fuzz from
        # 0.11.x through 0.13.1 ships the same broken rustix pin in its
        # Cargo.lock, so bumping version alone is insufficient — we have
        # to let cargo do fresh resolution.
        run: cargo install cargo-fuzz --version 0.13.1
      - name: run fuzz targets
        run: |
          cd fuzz
          cargo fuzz run command_can_execute -- -max_total_time=30
          cargo fuzz run path_can_access -- -max_total_time=30
          cargo fuzz run permission_serde -- -max_total_time=30
          cargo fuzz run workload_api_command -- -max_total_time=30

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  merge_group:

permissions:
  contents: read

jobs:
  changed-crates:
    name: Detect changed crates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      all: ${{ steps.detect.outputs.all }}
      crates: ${{ steps.detect.outputs.crates }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 0
      - name: Determine changed crates
        id: detect
        # Pass event/base data via env (never interpolate ${{ }} directly into
        # the run script — zizmor template-injection / code-injection
        # hardening, matching ck-admit.yml).
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail

          all=false
          changed=""

          if [ "$EVENT_NAME" = "merge_group" ] || [ "$EVENT_NAME" = "push" ]; then
            all=true
          else
            git fetch origin "$BASE" || true
            changed="$(git diff --name-only "origin/$BASE...HEAD")"
            if printf '%s\n' "$changed" | grep -qE '^Cargo\.toml$|^Cargo\.lock$|^\.github/'; then
              all=true
            fi
          fi

          crates=""
          if [ -n "$changed" ]; then
            crates="$(printf '%s\n' "$changed" | grep -oE '^crates/[^/]+' | sed 's#^crates/##' | sort -u | paste -sd' ' - || true)"
          fi

          echo "all=$all" >> "$GITHUB_OUTPUT"
          echo "crates=$crates" >> "$GITHUB_OUTPUT"

          {
            echo "### Changed-crate detection"
            echo ""
            echo "- Event: \`$EVENT_NAME\`"
            echo "- Full run forced: \`$all\`"
            if [ -n "$crates" ]; then
              echo "- Changed crates: \`$crates\`"
            else
              echo "- Changed crates: (none)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          components: rustfmt
          cache: true
      - name: cargo fmt
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          components: clippy
          targets: wasm32-unknown-unknown
          cache: true
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build wasm SDK (vendored into verifier-service via include_bytes!)
        run: wasm-pack build sdks/verifier-js --target web --release
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changed-crates
    if: ${{ needs.changed-crates.outputs.all == 'true' || needs.changed-crates.outputs.crates != '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          targets: wasm32-unknown-unknown
          cache: true
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build wasm SDK (vendored into verifier-service via include_bytes!)
        run: wasm-pack build sdks/verifier-js --target web --release
      - name: cargo test
        run: cargo test --all-features
      # Node tests run the WASM bindings against the cross-language golden seal
      # (settlement + commons) and the accept/reject smoke fixtures — per-PR, not
      # just on publish, so a binding-layer drift from the proven kernels is caught
      # here. Node is preinstalled on the ubuntu runner.
      - name: Node tests (golden seal + smoke) against built wasm
        working-directory: sdks/verifier-js
        run: npm test

  a2a-example:
    name: A2A example server (examples/a2a-server)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # examples/a2a-server is its own workspace (root Cargo.toml `exclude`), so
    # the root-level fmt/clippy/test jobs never touch it. This job is NOT
    # path-filtered on purpose: the example path-depends on
    # crates/nucleus-{agent-card,verify-commerce,envelope,lineage}, so a change
    # anywhere in those crates can break the example's receipt pre-image and
    # version-negotiation invariants without touching examples/**.
    defaults:
      run:
        working-directory: examples/a2a-server
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          components: rustfmt, clippy
          cache: true
          cache-workspaces: examples/a2a-server
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: cargo test
        run: cargo test --all-features

  owasp-gauntlet:
    name: OWASP LLM Security Gauntlet
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changed-crates
    if: ${{ needs.changed-crates.outputs.all == 'true' || needs.changed-crates.outputs.crates != '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          cache: true
      - name: Run OWASP LLM Top 10 security tests
        run: cargo test -p portcullis --test owasp_llm_gauntlet --all-features

  policy-kernel-parity:
    name: Policy-kernel model↔Rust parity (K4)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # The model↔Rust contract, as a FIRST-CLASS named check. The K4 proof
    # `governance_monotone_iff` (proven axiom-clean in the Portcullis-Core Proven
    # Lean workflow) is a statement ABOUT the Lean model; it only transfers to the
    # shipped Rust `decide`/`governance_monotone`/`representative_requests` via the
    # `nucleus-policy-kernel` `tests/model_parity.rs` proptest, which pins the two
    # semantics declaration-for-declaration. That parity pin already runs
    # transitively under the whole-workspace `cargo test --all-features` above, but
    # this dedicated job selects the crate EXPLICITLY (`-p nucleus-policy-kernel`)
    # so the contract is a required-able status check that cannot be silently
    # dropped if the umbrella `test` job is ever path-filtered or refactored —
    # closing the enforcement loop the Lean-side gate already documents.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          cache: true
      - name: cargo test -p nucleus-policy-kernel (parity pin)
        run: cargo test -p nucleus-policy-kernel

  musl-check:
    name: musl type-check (nucleus-node, nucleus-tool-proxy)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # The release pipeline builds static musl binaries, but every other job here
    # compiles against glibc — so glibc-only code (v2.0.1: __rlimit_resource_t in
    # hardening.rs) sails through PR CI and only explodes at release time. This
    # job type-checks the two shipped binaries against the musl target on every
    # PR to close that gap. musl-tools provides musl-gcc, which C-dependency
    # build scripts (e.g. ring) need to cross-compile.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          targets: x86_64-unknown-linux-musl
          cache: true
      - name: Install musl-gcc
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: cargo check (musl)
        run: cargo check -p nucleus-node -p nucleus-tool-proxy --target x86_64-unknown-linux-musl

  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changed-crates
    if: ${{ needs.changed-crates.outputs.all == 'true' || needs.changed-crates.outputs.crates != '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          toolchain: nightly
          cache: true
      - name: install cargo-fuzz
        # Pin version, but DROP --locked so cargo resolves a rustix newer
        # than the 0.36.5 cargo-fuzz bundles (0.36.5 uses rustc-internal
        # attributes that current nightly rejects). Every cargo-fuzz from
        # 0.11.x through 0.13.1 ships the same broken rustix pin in its
        # Cargo.lock, so bumping version alone is insufficient — we have
        # to let cargo do fresh resolution.
        run: cargo install cargo-fuzz --version 0.13.1
      - name: run fuzz targets
        run: |
          cd fuzz
          cargo fuzz run command_can_execute -- -max_total_time=30
          cargo fuzz run path_can_access -- -max_total_time=30
          cargo fuzz run permission_serde -- -max_total_time=30
          cargo fuzz run workload_api_command -- -max_total_time=30

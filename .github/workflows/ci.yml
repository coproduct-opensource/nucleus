name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  merge_group:

permissions:
  contents: read

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1
        with:
          components: rustfmt
          cache: true
      - name: cargo fmt
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1
        with:
          components: clippy
          cache: true
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1
        with:
          cache: true
      - name: cargo test
        run: cargo test --all-features

  owasp-gauntlet:
    name: OWASP LLM Security Gauntlet
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1
        with:
          cache: true
      - name: Run OWASP LLM Top 10 security tests
        run: cargo test -p portcullis --test owasp_llm_gauntlet --all-features

  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1
        with:
          toolchain: nightly
          cache: true
      - name: install cargo-fuzz
        # Pin version, but DROP --locked so cargo resolves a rustix newer
        # than the 0.36.5 cargo-fuzz bundles (0.36.5 uses rustc-internal
        # attributes that current nightly rejects). Every cargo-fuzz from
        # 0.11.x through 0.13.1 ships the same broken rustix pin in its
        # Cargo.lock, so bumping version alone is insufficient — we have
        # to let cargo do fresh resolution.
        run: cargo install cargo-fuzz --version 0.13.1
      - name: run fuzz targets
        run: |
          cd fuzz
          cargo fuzz run command_can_execute -- -max_total_time=30
          cargo fuzz run path_can_access -- -max_total_time=30
          cargo fuzz run permission_serde -- -max_total_time=30

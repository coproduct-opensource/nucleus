name: CK Policy Aeneas (extracted-core soundness)

# Tier-1 DEDUCTIVE bridge for the Constitutional Kernel monotonicity gate.
#
# This workflow (1) REGENERATES the Charon+Aeneas Lean translation of the
# self-contained core in crates/ck-policy/src/extracted.rs and fails on DRIFT vs
# the committed generated/ files; (2) `lake build`s the soundness proofs in
# crates/ck-policy/lean-aeneas/CkPolicyAeneas.lean; (3) bans
# sorry/admit/native_decide in OUR proof file and asserts (via `#print axioms`)
# that no soundness theorem depends on `sorryAx`.
#
# Mathlib posture (HONEST): the Aeneas Lean *standard library* transitively
# requires Mathlib at the pinned commit, so importing the GENERATED Funs.lean
# pulls Mathlib (unavoidable; identical to .github/workflows/aeneas.yml /
# portcullis-core). We therefore DO fetch the prebuilt Mathlib olean cache
# (`lake exe cache get`) — that caches an unavoidable transitive dependency, it
# does NOT make this an "uses Mathlib" proof. Our proof file itself uses only
# structural reasoning + Aeneas Std bind lemmas (no Mathlib lemmas, no
# native_decide). The sorry-ban + #print-axioms gates are scoped to OUR files,
# not the Aeneas stdlib (which carries its own internal `sorry`s, irrelevant
# because the axiom audit proves they are not in our theorems' dependency graph).

on:
  push:
    branches: ["main"]
    paths:
      - "crates/ck-policy/lean-aeneas/**"
      - "crates/ck-policy/src/extracted.rs"
      - "crates/ck-policy/tests/policy_aeneas_parity.rs"
      - ".github/workflows/ck-policy-aeneas.yml"
  pull_request:
    paths:
      - "crates/ck-policy/lean-aeneas/**"
      - "crates/ck-policy/src/extracted.rs"
      - "crates/ck-policy/tests/policy_aeneas_parity.rs"
      - ".github/workflows/ck-policy-aeneas.yml"
  merge_group:
  # Weekly canary to catch Charon/Aeneas/Mathlib drift.
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  # Pin to the Aeneas release that generated the committed Lean code.
  # Update with the generated/ files when regenerating.
  AENEAS_RELEASE: nightly-2026.06.10
  # Charon (bundled in that release) needs this rustc nightly (from the tarball's
  # rust-toolchain file; components rustc-dev,llvm-tools-preview,rust-src).
  CHARON_NIGHTLY: nightly-2026-06-01
  # Scope Charon to the extracted core root (whole-dep-graph walk chokes).
  EXTRACT_ROOT: "ck_policy::extracted::passed_core"

jobs:
  ck-policy-aeneas:
    name: charon+aeneas drift + lake build (extracted-core soundness)
    runs-on: ubuntu-24.04
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      # --- Rust nightly for Charon MIR extraction ---
      - name: Install Rust nightly for Charon
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: ${{ env.CHARON_NIGHTLY }}
          components: rustc-dev,llvm-tools-preview,rust-src

      - name: Rust / cargo cache (Charon target dir)
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2.9.1
        with:
          workspaces: crates/ck-policy
          key: charon-${{ env.CHARON_NIGHTLY }}-${{ env.AENEAS_RELEASE }}
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Cache Aeneas binary
        id: cache-aeneas-bin
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: /tmp/aeneas-bin
          key: aeneas-bin-${{ runner.os }}-${{ env.AENEAS_RELEASE }}

      - name: Download Aeneas pre-built binaries
        if: steps.cache-aeneas-bin.outputs.cache-hit != 'true'
        run: |
          gh release download "$AENEAS_RELEASE" \
            --repo AeneasVerif/aeneas \
            --pattern "aeneas-linux-x86_64.tar.gz" \
            --dir /tmp
          mkdir -p /tmp/aeneas-bin
          tar xzf /tmp/aeneas-linux-x86_64.tar.gz -C /tmp/aeneas-bin
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Add Aeneas to PATH
        run: echo "/tmp/aeneas-bin" >> "$GITHUB_PATH"

      - name: Verify tools
        run: |
          which charon && charon version
          which aeneas && aeneas -version

      # --- Regenerate the Lean translation (scoped to the extracted core) ---
      - name: Charon MIR extraction (scoped)
        working-directory: crates/ck-policy
        run: |
          # Force a recompile so Charon emits LLBC even on a warm cargo cache
          # (known footgun: a cached crate makes charon a <1s no-op).
          touch src/extracted.rs src/lib.rs
          # IMPORTANT: the LLBC basename is load-bearing for the drift gate.
          # Aeneas derives the generated Lean module name from this filename
          # (`ck_policy.llbc` -> `import CkPolicy.Types`), so the committed
          # generated/CkPolicy/* files only diff-match byte-for-byte when the
          # basename stays `ck_policy`. Do NOT rename it without regenerating.
          charon cargo --preset aeneas --start-from "$EXTRACT_ROOT" \
            --dest-file /tmp/ck_policy.llbc

      - name: Aeneas Lean 4 translation
        run: |
          rm -rf /tmp/ci-generated && mkdir -p /tmp/ci-generated
          aeneas -backend lean -split-files /tmp/ck_policy.llbc -dest /tmp/ci-generated

      # --- Drift gate: regenerated must match committed ---
      - name: Verify generated Lean matches committed (drift gate)
        run: |
          MISMATCH=0
          for f in Funs.lean Types.lean; do
            GEN="/tmp/ci-generated/$f"
            COMMITTED="crates/ck-policy/lean-aeneas/generated/CkPolicy/$f"
            if [ ! -f "$GEN" ]; then
              echo "ERROR: Aeneas did not emit $f"; MISMATCH=1; continue
            fi
            if ! diff -q "$COMMITTED" "$GEN" >/dev/null 2>&1; then
              echo "MISMATCH: $f (regenerated != committed)"
              diff "$COMMITTED" "$GEN" || true
              MISMATCH=1
            fi
          done
          if [ "$MISMATCH" -ne 0 ]; then
            echo ""
            echo "ERROR: committed generated Lean drifted from the Charon+Aeneas output."
            echo "Regenerate: cd crates/ck-policy && charon cargo --preset aeneas \\"
            echo "  --start-from '$EXTRACT_ROOT' --dest-file /tmp/ck_policy.llbc && \\"
            echo "  aeneas -backend lean -split-files /tmp/ck_policy.llbc \\"
            echo "  -dest crates/ck-policy/lean-aeneas/generated  (then move Funs/Types.lean into CkPolicy/)"
            exit 1
          fi
          echo "No drift — committed generated Lean matches the Charon+Aeneas output."

      # --- Build the proofs over the generated core ---
      - name: Install elan (Lean toolchain)
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --no-modify-path
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache Lake build artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: |
            crates/ck-policy/lean-aeneas/.lake
            ~/.elan
            ~/.cache/mathlib
          key: lean-ck-policy-aeneas-${{ runner.os }}-${{ hashFiles('crates/ck-policy/lean-aeneas/lean-toolchain', 'crates/ck-policy/lean-aeneas/lakefile.lean', 'crates/ck-policy/lean-aeneas/lake-manifest.json') }}
          restore-keys: |
            lean-ck-policy-aeneas-${{ runner.os }}-

      # Aeneas Std transitively requires Mathlib; fetch its prebuilt oleans so a
      # cold cache does not trigger a ~1h Mathlib compile.
      - name: Fetch Mathlib cache (prebuilt oleans)
        working-directory: crates/ck-policy/lean-aeneas
        run: lake exe cache get || true

      - name: lake build (soundness proofs over extracted core)
        working-directory: crates/ck-policy/lean-aeneas
        run: lake build CkPolicyAeneas

      # --- Ban proof holes in OUR file (NOT the Aeneas stdlib) ---
      # Comments are stripped first: the file's own status docstrings say
      # "0 native_decide" / describe the ban, and the previous bare
      # `native_decide` alternation matched those comment lines (latent —
      # this job only runs when its own paths change, so the self-match
      # only surfaced via an actions-bump PR touching all workflows). The
      # kernel-level backstop is the #print-axioms step below; this grep
      # is the fast human-readable layer.
      - name: Ban sorry / admit / native_decide in our proof file
        run: |
          stripped="$(sed -e '/\/-/,/-\//d' -e 's/--.*$//' \
               crates/ck-policy/lean-aeneas/CkPolicyAeneas.lean)"
          if grep -nE \
               '(:=[[:space:]]*by[[:space:]]+sorry|:=[[:space:]]*sorry|^[[:space:]]*sorry$|:=[[:space:]]*by[[:space:]]+admit|^[[:space:]]*admit$|native_decide)' \
               <<<"$stripped"; then
            echo "ERROR: CkPolicyAeneas.lean uses 'sorry'/'admit'/'native_decide' (banned)."
            exit 1
          fi
          echo "No sorry / admit / native_decide in CkPolicyAeneas.lean (comments stripped)."

      - name: Assert theorems are sorryAx-free (#print axioms)
        working-directory: crates/ck-policy/lean-aeneas
        run: |
          cat > PrintAxioms.lean <<'EOF'
          import CkPolicyAeneas
          open CkPolicyAeneas
          #print axioms passed_core_decomp
          #print axioms rules_non_weakening_sound
          #print axioms budget_not_violated
          #print axioms T1_extracted_gate_sound
          EOF
          AXIOMS="$(lake env lean PrintAxioms.lean)"
          echo "$AXIOMS"
          rm -f PrintAxioms.lean
          if echo "$AXIOMS" | grep -q 'sorryAx'; then
            echo "ERROR: an extracted-core soundness theorem depends on 'sorryAx'."
            exit 1
          fi
          echo "No soundness theorem depends on sorryAx — proofs are kernel-complete."

      # --- Tier-4 parity: extracted core ↔ production check_monotonicity ---
      - name: Install stable Rust for parity test
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable

      - name: cargo test (extracted-core ↔ production parity)
        working-directory: crates/ck-policy
        env:
          CARGO_TERM_COLOR: never
        run: cargo test --test policy_aeneas_parity

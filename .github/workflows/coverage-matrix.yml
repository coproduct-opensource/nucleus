name: Coverage Matrix

on:
  push:
    branches: ["main"]
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Detects which crates changed so the heavy coverage/mutation/proof jobs
  # below can skip on PRs with no crate-relevant changes (docs-only, etc).
  # A skipped required job reports "skipped", which GitHub treats as a
  # passing status check.
  changed-crates:
    name: Detect Changed Crates
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      all: ${{ steps.detect.outputs.all }}
      crates: ${{ steps.detect.outputs.crates }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 0
      - name: Detect changed crates
        id: detect
        # Pass event name / base ref via env (never interpolate ${{ }} into a
        # run script — zizmor template-injection / code-injection hardening,
        # as in ck-admit.yml).
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail

          all=false
          changed=""

          if [ "$EVENT_NAME" = "pull_request" ]; then
            # Unshallowed fetch of the base ref: a shallow base would leave
            # the three-dot merge-base unreachable for `git diff`.
            git fetch origin "$BASE" || true
            changed="$(git diff --name-only "origin/$BASE...HEAD")"
          else
            # merge_group / push / workflow_dispatch: run everything.
            all=true
          fi

          if [ "$all" != "true" ] && printf '%s\n' "$changed" | grep -qE '^(Cargo\.toml|Cargo\.lock)$|^\.github/'; then
            all=true
          fi

          # `|| true` tolerates no crates/ match (e.g. a docs-only PR), which
          # under `set -euo pipefail` would otherwise crash this job instead
          # of correctly skipping the heavy jobs below.
          crates="$(printf '%s\n' "$changed" | grep -oE '^crates/[^/]+' | sed 's#^crates/##' | sort -u | paste -sd' ' - || true)"

          echo "all=$all" >> "$GITHUB_OUTPUT"
          echo "crates=$crates" >> "$GITHUB_OUTPUT"

          {
            echo "## Changed Crates Detection"
            echo ""
            echo "- event: \`$EVENT_NAME\`"
            echo "- full run forced: \`$all\`"
            echo "- changed crates: \`${crates:-none}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # Layer 1: LLVM source-based code coverage with threshold enforcement
  llvm-cov:
    name: Code Coverage (llvm-cov)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changed-crates
    if: ${{ needs.changed-crates.outputs.all == 'true' || needs.changed-crates.outputs.crates != '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          components: llvm-tools-preview
          cache: true
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: Workspace coverage (threshold gate)
        run: |
          cargo llvm-cov --all-features \
            --fail-under-lines 85 \
            --ignore-filename-regex '(tests/|kani\.rs|main\.rs)' 2>&1 | tee /tmp/workspace-cov.txt
      - name: portcullis coverage (security-critical threshold)
        run: |
          cargo llvm-cov --all-features -p portcullis \
            --fail-under-lines 87 \
            --ignore-filename-regex '(tests/|kani\.rs)' 2>&1 | tee /tmp/portcullis-cov.txt
      - name: Generate JSON coverage report
        if: always()
        run: |
          cargo llvm-cov --all-features -p portcullis \
            --json --output-path /tmp/portcullis-cov.json \
            --ignore-filename-regex '(tests/|kani\.rs)' || true
      - name: Coverage summary
        if: always()
        run: |
          echo "## Code Coverage Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Workspace" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -5 /tmp/workspace-cov.txt >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### portcullis (security-critical)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -5 /tmp/portcullis-cov.txt >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Thresholds:** workspace ≥ 85% lines, portcullis ≥ 87% lines" >> "$GITHUB_STEP_SUMMARY"

  # Layer 2: Mutation testing on security-critical modules
  mutants:
    name: Mutation Testing
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: changed-crates
    if: ${{ needs.changed-crates.outputs.all == 'true' || needs.changed-crates.outputs.crates != '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          cache: true
      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked
      - name: Run mutation tests on security-critical modules
        run: |
          cargo mutants --package portcullis \
            --file crates/portcullis/src/capability.rs \
            --file crates/portcullis/src/guard.rs \
            --file crates/portcullis/src/lattice.rs \
            --file crates/portcullis/src/certificate.rs \
            --file crates/portcullis/src/delegation.rs \
            --file crates/portcullis/src/trust.rs \
            --timeout 120 \
            -- --all-features 2>&1 | tee /tmp/mutants.txt
      - name: Check for survived mutants
        if: always()
        run: |
          echo "## Mutation Testing Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Modules tested:** capability, guard, lattice, certificate, delegation, trust" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if grep -q "SURVIVED" /tmp/mutants.txt 2>/dev/null; then
            echo "⚠️ **Survived mutants found** — tests may have coverage gaps:" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            grep "SURVIVED" /tmp/mutants.txt >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "::error::Survived mutants detected in security-critical modules"
            exit 1
          else
            echo "All mutants caught by tests." >> "$GITHUB_STEP_SUMMARY"
          fi

  # Layer 3: Verification proof count regression gates
  #
  # Verus verification count is gated in verus.yml (runs the actual verifier).
  # Here we gate Kani proof harnesses and report all counts for visibility.
  proof-ratchet:
    name: Proof Count Ratchet
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: changed-crates
    if: ${{ needs.changed-crates.outputs.all == 'true' || needs.changed-crates.outputs.crates != '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - name: Count Kani proofs
        id: kani-count
        run: |
          PORTCULLIS=$(grep -c '#\[kani::proof\]' crates/portcullis/src/kani.rs)
          CK_KERNEL=$(grep -c '#\[kani::proof\]' crates/ck-kernel/src/kani.rs)
          CORE=$(grep -rc '#\[kani::proof\]' crates/portcullis-core/src/ || echo 0)
          PROOF_COUNT=$((PORTCULLIS + CK_KERNEL + CORE))
          MINIMUM=$(cat .kani-minimum-proofs | tr -d '[:space:]')
          echo "count=$PROOF_COUNT" >> "$GITHUB_OUTPUT"
          echo "minimum=$MINIMUM" >> "$GITHUB_OUTPUT"
          echo "Kani proof harnesses: $PROOF_COUNT (portcullis: $PORTCULLIS, ck-kernel: $CK_KERNEL, core: $CORE, minimum: $MINIMUM)"
          if [ "$PROOF_COUNT" -lt "$MINIMUM" ]; then
            echo "::error::Kani proof count regression: $PROOF_COUNT < $MINIMUM (portcullis: $PORTCULLIS, ck-kernel: $CK_KERNEL, core: $CORE)"
            exit 1
          fi
      - name: Count verification artifacts
        id: counts
        run: |
          VERUS_PROOF=0  # portcullis-verified removed; Verus proofs superseded by Lean 4 + Kani
          CONFORMANCE=$(grep -c 'proptest!' crates/portcullis/tests/verus_conformance.rs)
          echo "verus_proof=$VERUS_PROOF" >> "$GITHUB_OUTPUT"
          echo "conformance=$CONFORMANCE" >> "$GITHUB_OUTPUT"
          echo "Verus proof functions: $VERUS_PROOF"
          echo "Conformance test suites: $CONFORMANCE"
      - name: Ratchet summary
        if: always()
        run: |
          echo "## Proof Count Ratchet" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Layer | Count | Minimum | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|---------|--------|" >> "$GITHUB_STEP_SUMMARY"

          VERUS="${{ steps.counts.outputs.verus_proof }}"
          echo "| Verus proof fns | ${VERUS:-?} | — | gated in verus.yml |" >> "$GITHUB_STEP_SUMMARY"

          KANI="${{ steps.kani-count.outputs.count }}"
          KANI_MIN="${{ steps.kani-count.outputs.minimum }}"
          if [ -n "$KANI" ] && [ "$KANI" -ge "$KANI_MIN" ]; then
            echo "| Kani BMC harnesses | $KANI | $KANI_MIN | pass |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Kani BMC harnesses | ${KANI:-?} | ${KANI_MIN:-?} | FAIL |" >> "$GITHUB_STEP_SUMMARY"
          fi

          CONF="${{ steps.counts.outputs.conformance }}"
          echo "| Conformance suites | ${CONF:-?} | — | info |" >> "$GITHUB_STEP_SUMMARY"

name: Cargo Deny

on:
  push:
    branches: [main]
    paths:
      - Cargo.lock
      - Cargo.toml
      - crates/**/Cargo.toml
      - deny.toml
  pull_request:
  merge_group:
  schedule:
    - cron: "0 7 * * 1"

permissions:
  contents: read

jobs:
  deny:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        checks:
          - advisories
          - bans
          - licenses
          - sources
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: EmbarkStudios/cargo-deny-action@3fd3802e88374d3fe9159b834c7714ec57d6c979 # v2
        with:
          command: check
          args: "${{ matrix.checks }}"

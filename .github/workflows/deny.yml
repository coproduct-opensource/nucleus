name: Cargo Deny

on:
  push:
    branches: [main]
    paths:
      - Cargo.lock
      - Cargo.toml
      - crates/**/Cargo.toml
      - deny.toml
  pull_request:
  merge_group:
  schedule:
    - cron: "0 7 * * 1"

permissions:
  contents: read

jobs:
  deny:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        checks:
          - advisories
          - bans
          - licenses
          - sources
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check
          args: "${{ matrix.checks }}"

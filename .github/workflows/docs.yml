name: Docs

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "slides/**"
      - "blog/**"
      - "book.toml"
      - "sdks/verifier-js/**"
      - "crates/nucleus-envelope/**"
      - "crates/ctf-engine/**"
      - ".github/workflows/docs.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          toolchain: stable
          cache: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Install mdBook
        run: cargo install mdbook --locked
      - name: Build docs
        run: mdbook build
      - name: Build slides
        run: |
          mkdir -p book/slides
          npx --yes @marp-team/marp-cli@latest \
            -I slides \
            --html \
            -o book/slides
      - name: Copy blog posts
        run: |
          mkdir -p book/blog
          cp blog/*.md book/blog/
      # --- In-browser verifier demo, published at /verify/ ---
      # Real fixtures (generated + self-verified by the example) + the Rust
      # verifier compiled to WASM. No fake data; reproducible from source.
      - name: Build verifier WASM + real fixtures
        run: |
          rustup target add wasm32-unknown-unknown
          cargo install wasm-pack --locked --version 0.13.1
          cargo run -p nucleus-envelope --example emit_demo_bundle -- sdks/verifier-js/demo-fixtures
          wasm-pack build sdks/verifier-js --target web --release
      - name: Assemble /verify into the docs site
        run: |
          mkdir -p book/verify/pkg book/verify/demo-fixtures
          cp sdks/verifier-js/demo.html book/verify/index.html
          cp sdks/verifier-js/demo.js   book/verify/demo.js
          cp sdks/verifier-js/pkg/nucleus_verifier_wasm.js \
             sdks/verifier-js/pkg/nucleus_verifier_wasm_bg.wasm \
             sdks/verifier-js/pkg/*.d.ts \
             book/verify/pkg/
          cp sdks/verifier-js/demo-fixtures/*.json book/verify/demo-fixtures/
          touch book/.nojekyll
      # --- "The Vault" CTF, published at /vault/ ---
      # Browser/WASM CTF: try to exfiltrate past a formally-verified permission
      # lattice. Built with Trunk (wasm_bindgen pinned in Trunk.toml); public-url
      # must match the deploy subpath so assets resolve.
      - name: Build The Vault (WASM) + assemble into /vault
        run: |
          cargo install trunk --locked
          cd crates/ctf-engine
          trunk build --release --public-url /nucleus/vault/
          cd ../..
          mkdir -p book/vault
          cp -r crates/ctf-engine/dist/. book/vault/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./book

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    permissions:
      pages: write
      id-token: write
    if: ${{ vars.DOCS_DEPLOY == 'true' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

name: Docs

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "slides/**"
      - "blog/**"
      - "book.toml"
      - ".github/workflows/docs.yml"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions-rust-lang/setup-rust-toolchain@a0b538fa0b742a6aa35d6e2c169b4bd06d225a98 # v1
        with:
          toolchain: stable
          cache: true
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Install mdBook
        run: cargo install mdbook --locked
      - name: Build docs
        run: mdbook build
      - name: Build slides
        run: |
          mkdir -p book/slides
          npx --yes @marp-team/marp-cli@latest \
            -I slides \
            --html \
            -o book/slides
      - name: Copy blog posts
        run: |
          mkdir -p book/blog
          cp blog/*.md book/blog/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: ./book

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    if: ${{ vars.DOCS_DEPLOY == 'true' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

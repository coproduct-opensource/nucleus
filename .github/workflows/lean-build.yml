name: Lean 4 Kernel Proof

on:
  push:
    branches: ["main"]
    paths:
      - "crates/portcullis-verified/lean/**"
      - "crates/portcullis-core/lean/**"
  pull_request:
    paths:
      - "crates/portcullis-verified/lean/**"
      - "crates/portcullis-core/lean/**"
  merge_group:
    paths:
      - "crates/portcullis-verified/lean/**"
      - "crates/portcullis-core/lean/**"

permissions:
  contents: read

jobs:
  lean-build:
    name: lake build PortcullisVerified
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install elan (Lean toolchain manager)
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --no-modify-path
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Pin toolchain from lean-toolchain
        working-directory: crates/portcullis-verified/lean
        run: |
          # elan reads lean-toolchain automatically; just verify it resolves
          lean --version

      - name: Cache Lake / Mathlib build artifacts
        uses: actions/cache@v4
        with:
          path: |
            crates/portcullis-verified/lean/.lake
            ~/.elan
          key: lean-${{ runner.os }}-${{ hashFiles('crates/portcullis-verified/lean/lean-toolchain', 'crates/portcullis-verified/lean/lakefile.lean') }}
          restore-keys: |
            lean-${{ runner.os }}-

      - name: lake build PortcullisVerified
        working-directory: crates/portcullis-verified/lean
        run: lake build PortcullisVerified
        # This step kernel-checks every theorem in CapabilityLevel.lean via the
        # Lean 4 type-checker.  No SMT oracle is involved — proofs discharge via
        # `decide` (finite enumeration over the 3-element CapabilityLevel type).
        # A non-zero exit code means the HeytingAlgebra instance failed to typecheck.

      - name: Reject sorry (proof holes)
        working-directory: crates/portcullis-verified/lean
        run: |
          # `sorry` is a Lean axiom that proves anything — used as a placeholder.
          # lake build exits 0 even with sorry present, so we grep to catch holes.
          # This was found by the QA adversarial pass.
          if grep -rn 'sorry' PortcullisVerified/ --include='*.lean'; then
            echo "ERROR: Lean proofs contain 'sorry' — proof has holes."
            echo "All theorems must be fully proven, no placeholders."
            exit 1
          fi
          echo "No sorry found — all proofs are complete."

  lean-build-core:
    name: lake build PortcullisCoreBridge
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install elan (Lean toolchain manager)
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --no-modify-path
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Pin toolchain from lean-toolchain
        working-directory: crates/portcullis-core/lean
        run: lean --version

      - name: Cache Lake / Mathlib build artifacts
        uses: actions/cache@v4
        with:
          path: |
            crates/portcullis-core/lean/.lake
            ~/.elan
          key: lean-core-${{ runner.os }}-${{ hashFiles('crates/portcullis-core/lean/lean-toolchain', 'crates/portcullis-core/lean/lakefile.lean') }}
          restore-keys: |
            lean-core-${{ runner.os }}-

      - name: lake build PortcullisCoreBridge
        working-directory: crates/portcullis-core/lean
        run: lake build PortcullisCoreBridge

      - name: Reject sorry (proof holes)
        working-directory: crates/portcullis-core/lean
        run: |
          if grep -rn 'sorry' PortcullisCoreBridge.lean generated/PortcullisCore/ --include='*.lean'; then
            echo "ERROR: Lean proofs contain 'sorry' — proof has holes."
            exit 1
          fi
          echo "No sorry found — all proofs are complete."

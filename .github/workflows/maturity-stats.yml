name: maturity-stats

# Computes EXACT maturity metrics and refreshes the README badges + table.
# The numbers are COMPUTED by scripts/maturity-probe.sh, never hand-authored —
# they cannot drift from reality. Badges are committed JSON read by shields.io
# /endpoint (no gist / no secret).

on:
  push:
    branches: [main]
    paths:
      - '**/*.lean'
      - '**/*.rs'
      - 'scripts/maturity-probe.sh'
      - '.github/workflows/maturity-stats.yml'
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: maturity-stats
  cancel-in-progress: false

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute maturity probe (badges + table)
        run: bash scripts/maturity-probe.sh badges

      - name: Inject README block between markers
        run: |
          python3 - <<'PY'
          import re, pathlib
          table = pathlib.Path("badges/_table.md").read_text()
          readme = pathlib.Path("README.md").read_text()
          block = ("<!-- MATURITY:START -->\n"
                   "<!-- Generated by scripts/maturity-probe.sh — do not edit by hand. -->\n\n"
                   + table.rstrip() + "\n\n<!-- MATURITY:END -->")
          new = re.sub(r"<!-- MATURITY:START -->.*?<!-- MATURITY:END -->",
                       lambda _: block, readme, count=1, flags=re.S)
          if new != readme:
              pathlib.Path("README.md").write_text(new)
          PY

      - name: Commit refreshed stats if changed
        run: |
          rm -f badges/_table.md
          if [ -n "$(git status --porcelain badges/ README.md maturity.json)" ]; then
            git config user.name  'maturity-bot'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add badges/ README.md maturity.json
            git commit -m 'chore(stats): refresh maturity badges [skip ci]'
            git push
          else
            echo "maturity stats unchanged"
          fi

name: Verus

on:
  push:
    branches: ["main"]
    paths:
      - "crates/portcullis-verified/**"
      - ".verus-version"
      - ".verus-minimum-proofs"
      - ".github/workflows/verus.yml"
  pull_request:
    paths:
      - "crates/portcullis-verified/**"
      - ".verus-version"
      - ".verus-minimum-proofs"
      - ".github/workflows/verus.yml"
  schedule:
    # Nightly: catch regressions from Verus toolchain updates
    - cron: "42 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verus SMT Proofs
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Read Verus version
        id: verus-version
        run: echo "version=$(cat .verus-version | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Cache Verus binary
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        id: cache-verus
        with:
          path: .verus/verus-x86-linux
          key: verus-linux-${{ steps.verus-version.outputs.version }}

      - name: Download Verus
        if: steps.cache-verus.outputs.cache-hit != 'true'
        run: |
          mkdir -p .verus
          VERUS_TAG="${{ steps.verus-version.outputs.version }}"
          VERUS_FILE="verus-${VERUS_TAG#release/}-x86-linux.zip"
          gh release download "$VERUS_TAG" \
            -R verus-lang/verus \
            -p "$VERUS_FILE" \
            -D .verus/
          cd .verus && unzip "$VERUS_FILE" && rm "$VERUS_FILE"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install Verus Rust toolchain
        run: |
          REQUIRED=$(.verus/verus-x86-linux/verus --version 2>&1 | grep -oP 'Toolchain: \K\S+' || true)
          if [ -z "$REQUIRED" ]; then
            REQUIRED=$(.verus/verus-x86-linux/verus 2>&1 | grep -oP "toolchain '\K[^']+")
          fi
          echo "Installing Rust toolchain: $REQUIRED"
          rustup install "$REQUIRED"
          rustup default "$REQUIRED"

      - name: Verify portcullis-verified
        id: verify
        run: |
          echo "::group::Verus verification"
          .verus/verus-x86-linux/verus crates/portcullis-verified/src/lib.rs 2>&1 | tee /tmp/verus-output.txt
          echo "::endgroup::"

      - name: Proof count regression gate
        run: |
          VERIFIED=$(grep -oP '\d+ verified' /tmp/verus-output.txt | grep -oP '^\d+')
          MINIMUM=$(cat .verus-minimum-proofs | tr -d '[:space:]')
          echo "Verified: $VERIFIED (minimum: $MINIMUM)"
          if [ "$VERIFIED" -lt "$MINIMUM" ]; then
            echo "::error::Verus proof count regression: $VERIFIED verified < $MINIMUM minimum"
            exit 1
          fi

      - name: Summary
        if: always()
        run: |
          VERIFIED=$(grep -oP '\d+ verified' /tmp/verus-output.txt | grep -oP '^\d+' || echo "?")
          ERRORS=$(grep -oP '\d+ errors' /tmp/verus-output.txt | grep -oP '^\d+' || echo "?")
          MINIMUM=$(cat .verus-minimum-proofs | tr -d '[:space:]')
          echo "## Verus Verification Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Verus version:** ${{ steps.verus-version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Target:** \`crates/portcullis-verified/src/lib.rs\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Result:** $VERIFIED verified, $ERRORS errors" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Minimum required:** $MINIMUM" >> "$GITHUB_STEP_SUMMARY"

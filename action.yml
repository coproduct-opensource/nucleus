name: 'Nucleus Safe PR Fixer'
author: 'coproduct-opensource'
description: 'Run an AI agent with lattice-enforced permissions to fix issues safely'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  issue-number:
    description: 'GitHub issue number to fix'
    required: true
  model:
    description: 'LLM model to use'
    default: 'claude-sonnet-4-20250514'
  api-key:
    description: 'LLM API key (e.g., ANTHROPIC_API_KEY)'
    required: true
  profile:
    description: 'Nucleus permission profile'
    default: 'safe_pr_fixer'
  timeout:
    description: 'Timeout in seconds'
    default: '3600'
  nucleus-version:
    description: 'Nucleus CLI version to install (or "latest")'
    default: 'latest'
  github-token:
    description: 'GitHub token for PR creation (defaults to github.token)'
    default: ''

outputs:
  branch:
    description: 'Branch name created for the fix'
    value: ${{ steps.fix.outputs.branch }}
  pr-url:
    description: 'URL of the created pull request'
    value: ${{ steps.fix.outputs.pr_url }}

runs:
  using: 'composite'
  steps:
    - name: Install Nucleus CLI
      shell: bash
      run: |
        set -euo pipefail
        REPO="coproduct-opensource/nucleus"
        if [ "${{ inputs.nucleus-version }}" = "latest" ]; then
          VERSION=$(curl -fsSL "https://api.github.com/repos/${REPO}/releases/latest" | jq -r '.tag_name')
        else
          VERSION="${{ inputs.nucleus-version }}"
        fi
        VERSION_NUM="${VERSION#v}"

        # Detect architecture
        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64)  TARGET="x86_64-unknown-linux-musl" ;;
          aarch64) TARGET="aarch64-unknown-linux-musl" ;;
          *)       echo "::error::Unsupported architecture: $ARCH"; exit 1 ;;
        esac

        BASE_URL="https://github.com/${REPO}/releases/download/${VERSION}"
        mkdir -p "$HOME/.nucleus/bin"

        # Download CLI, tool-proxy, and MCP binaries
        for BIN in nucleus-cli nucleus-tool-proxy nucleus-mcp; do
          ARTIFACT="${BIN}-${VERSION_NUM}-${TARGET}.tar.gz"
          echo "::group::Installing ${BIN}"
          curl -fsSL "${BASE_URL}/${ARTIFACT}" | tar -xz -C "$HOME/.nucleus/bin/"
          echo "::endgroup::"
        done

        chmod +x "$HOME/.nucleus/bin/"*
        echo "$HOME/.nucleus/bin" >> "$GITHUB_PATH"

    - name: Install Claude Code CLI
      shell: bash
      run: |
        npm install -g @anthropic-ai/claude-code
        claude --version

    - name: Run safe PR fixer
      id: fix
      shell: bash
      env:
        NUCLEUS_PROFILE: ${{ inputs.profile }}
        ISSUE_NUMBER: ${{ inputs.issue-number }}
        LLM_API_TOKEN: ${{ inputs.api-key }}
        NUCLEUS_TIMEOUT: ${{ inputs.timeout }}
        LLM_MODEL: ${{ inputs.model }}
        GH_TOKEN: ${{ inputs.github-token || github.token }}
      run: ${{ github.action_path }}/scripts/action-entrypoint.sh

# Enforcement completeness (#1216): all I/O must go through portcullis-effects.
# New code using these types fails clippy. Existing code has file-level
# #![allow(clippy::disallowed_types)] until migrated.
disallowed-types = [
    { path = "std::fs::File", reason = "use portcullis_effects::FileEffect via NucleusRuntime::read_file/write_file" },
    { path = "std::fs::OpenOptions", reason = "use portcullis_effects::FileEffect via NucleusRuntime::write_file" },
    { path = "std::process::Command", reason = "use portcullis_effects::ShellEffect via NucleusRuntime::run_shell" },
    { path = "tokio::process::Command", reason = "use portcullis_effects::ShellEffect via NucleusRuntime::run_shell" },
    { path = "reqwest::Client", reason = "use portcullis_effects::WebEffect via NucleusRuntime::fetch_url" },
    { path = "reqwest::blocking::Client", reason = "use portcullis_effects::WebEffect via NucleusRuntime::fetch_url" },
]

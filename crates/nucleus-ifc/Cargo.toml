[package]
name = "nucleus-ifc"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Information Flow Control for AI agents — the only IFC library shipping in production"
repository = "https://github.com/coproduct-opensource/nucleus"
keywords = ["ai", "security", "ifc", "information-flow", "provenance"]
categories = ["development-tools"]

[dependencies]
portcullis-core = { version = "1.0.0", path = "../portcullis-core" }
serde = { version = "1", features = ["derive"], optional = true }

[dev-dependencies]
# Golden-vector reader (tests/golden.rs, gated on `decision`): reads the IFC
# decision vectors shared with the WASM recomputeVerdict binding.
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[features]
# The model-level IFC `decision` module (FlowDeclaration → IfcVerdict). Pulls
# serde; kept optional so the base IFC engine stays dependency-light. Enabled by
# nucleus-verify-commerce and the wasm recompute SDK so both share one decision.
decision = ["dep:serde"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

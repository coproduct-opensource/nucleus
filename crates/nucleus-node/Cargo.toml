[package]
name = "nucleus-node"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Node daemon (kubelet analogue) for nucleus pods"
repository = "https://github.com/coproduct-opensource/nucleus"
documentation = "https://docs.rs/nucleus-node"
readme = "README.md"
keywords = ["ai", "security", "daemon", "kubelet"]
categories = ["network-programming", "development-tools"]

[[bin]]
name = "nucleus-node"
path = "src/main.rs"

[features]
default = []
# Enable local driver (no VM isolation). DO NOT enable in production.
local-driver = []

[dependencies]
axum = { workspace = true }
clap = { workspace = true }
http-body-util = "0.1"
hyper = { version = "1", features = ["client", "http1"] }
hyper-util = { version = "0.1", features = ["tokio"] }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["full", "process"] }
tokio-stream = "0.1"
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tonic = { workspace = true }
prost = { workspace = true }
prost-types = { workspace = true }
tonic-prost = { workspace = true }
hmac = { workspace = true }
sha2 = { workspace = true }
hex = { workspace = true }
ipnet = "2.12"

# GitHub OIDC support. Use the workspace pin (aws_lc_rs backend) so node doesn't
# pull a second jsonwebtoken crypto backend / dalek line.
jsonwebtoken = { workspace = true }
reqwest = { workspace = true, features = ["json", "rustls-no-provider"] }
rustls = { workspace = true }
webpki-roots = "1.0"
base64 = { workspace = true }
# `alloc` is required (alongside `pkcs8`) for the EncodePrivateKey/DecodePrivateKey
# (`to_pkcs8_der`/`from_pkcs8_der`) impls — dalek 3 split alloc out of `pkcs8`.
# Version comes from the workspace pin (=3.0.0-pre.7); only the extra features
# are declared here.
ed25519-dalek = { workspace = true, features = ["rand_core", "pkcs8", "alloc"] }
rand_core = { version = "0.6", features = ["getrandom"] }

# X.509 certificate parsing for SPIFFE ID extraction
x509-parser = { workspace = true }
oid-registry = "0.8"

bollard = "0.21"

nucleus = { path = "../nucleus" }
nucleus-identity = { path = "../nucleus-identity" }
nucleus-proto = { path = "../nucleus-proto" }
nucleus-spec = { path = "../nucleus-spec" }
nucleus-client = { path = "../nucleus-client", features = ["async-drand"] }
portcullis = { path = "../portcullis", features = ["serde"] }

uuid = { workspace = true, features = ["serde"] }

[dev-dependencies]
tempfile = { workspace = true }
tokio-test = { workspace = true }
# Property-based tests for the policy -> Firecracker VM-config lowering isolation
# invariants (read-only rootfs, vsock CID distinctness, netns never omitted,
# seccomp flags). The lowering seams are pure + platform-independent so these
# run on every host, not only Linux.
proptest = { workspace = true }

[lints]
workspace = true

[package]
name = "nucleus-oidc-core"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
description = "Provider-agnostic OIDC primitives — JWKS resolution (RSA + Ed25519/OKP), replay protection, federation-dispatch hooks, and the shared error type. Consumed by per-provider validator crates that register their issuer pattern at startup."
repository = "https://github.com/coproduct-opensource/nucleus"  # vendor-allow: project repo URL
keywords = ["oidc", "oauth", "jwks", "jwt", "federation"]
categories = ["cryptography", "authentication"]

[dependencies]
async-trait = { workspace = true }
base64 = { workspace = true }
ed25519-dalek = { workspace = true, default-features = false }
# JWT-SVID signature verification (RS/PS/ES allowlist). Workspace-pinned to
# the same `rust_crypto` (RustCrypto) backend the rest of the workspace uses,
# so this adds no new crypto backend to the supply chain.
jsonwebtoken = { workspace = true }
reqwest = { workspace = true, features = ["json", "rustls"] }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt", "rt-multi-thread"] }

[lints]
workspace = true

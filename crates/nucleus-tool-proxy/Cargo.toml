[package]
name = "nucleus-tool-proxy"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Tool proxy server running inside nucleus pods"
repository = "https://github.com/coproduct-opensource/nucleus"
documentation = "https://docs.rs/nucleus-tool-proxy"
readme = "README.md"
keywords = ["ai", "security", "proxy", "sandbox"]
categories = ["network-programming", "development-tools"]

[[bin]]
name = "nucleus-tool-proxy"
path = "src/main.rs"

[features]
default = []
# Enable SPIRE Workload API for real SVID fetch (Tier 2 sandbox proof)
spire = ["nucleus-identity/spire"]
# MCP server mode (stdio transport)
mcp = ["dep:rmcp", "dep:schemars"]
# Red-team harness: Claude vs. Portcullis (requires ANTHROPIC_API_KEY)
red-team = []
# Remote append-only audit sink (S3-compatible: AWS S3, MinIO, R2, Tigris)
remote-audit = ["dep:aws-sdk-s3", "dep:aws-config"]
# OpenTelemetry permission telemetry — emits OTLP spans for every verdict
otel = ["dep:opentelemetry", "dep:opentelemetry_sdk", "dep:opentelemetry-otlp", "dep:tracing-opentelemetry"]

[dependencies]
axum = { workspace = true }
clap = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["full"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
hmac = { workspace = true }
sha2 = { workspace = true }
hex = { workspace = true }
dirs = "6.0"
whoami = "1"
reqwest = { workspace = true, features = ["rustls-no-provider", "json", "query"] }
url = "2.5"
uuid = { workspace = true }
chrono = { workspace = true, features = ["serde"] }

nucleus = { path = "../nucleus" }
nucleus-spec = { path = "../nucleus-spec" }
nucleus-identity = { path = "../nucleus-identity" }
nucleus-client = { path = "../nucleus-client", features = ["async-drand"] }
nucleus-proto = { path = "../nucleus-proto" }
portcullis = { path = "../portcullis", features = ["serde", "spec"] }
nucleus-permission-market = { path = "../nucleus-permission-market" }

tonic = { workspace = true }
tokio-stream = "0.1"
tokio-util = "0.7"

base64 = { workspace = true }
ring = { workspace = true }
rust_decimal = { workspace = true }
pem = "3"

# File search tools
glob = "0.3"
walkdir = "2"
regex = { workspace = true }
x509-parser = { workspace = true }

# MCP server mode (optional)
rmcp = { version = "1.3", features = ["server", "macros", "transport-io"], optional = true }
schemars = { version = "1", optional = true }
tokio-rustls = { workspace = true }
rustls = { workspace = true }

# OpenTelemetry permission telemetry (optional)
opentelemetry = { workspace = true, optional = true }
opentelemetry_sdk = { workspace = true, optional = true }
opentelemetry-otlp = { workspace = true, optional = true }
tracing-opentelemetry = { workspace = true, optional = true }

# Remote audit sink (optional, S3-compatible)
aws-sdk-s3 = { workspace = true, optional = true }
aws-config = { workspace = true, optional = true }

[target.'cfg(target_os = "linux")'.dependencies]
tokio-vsock = "0.7"

[dev-dependencies]
tempfile = { workspace = true }

[lints]
workspace = true

[package]
name = "nucleus-verifier-service"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Public verifier-as-a-service for nucleus provenance bundles"
repository = "https://github.com/coproduct-opensource/nucleus"
readme = "README.md"
keywords = ["verifier", "provenance", "ifc", "transparency", "audit"]
categories = ["web-programming::http-server"]

[[bin]]
name = "nucleus-verifier-service"
path = "src/main.rs"

[dependencies]
nucleus-envelope = { path = "../nucleus-envelope" }
nucleus-lineage = { path = "../nucleus-lineage" }
nucleus-agent-card = { path = "../nucleus-agent-card" }
axum = { version = "0.8", features = ["macros", "json"] }
tokio = { workspace = true, features = ["full"] }
tower = { version = "0.5", features = ["util", "limit"] }
tower-http = { version = "0.6", features = ["trace", "timeout", "cors", "limit"] }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
nucleus-otel-bootstrap = { path = "../nucleus-otel-bootstrap" }
clap = { workspace = true }
hex = { workspace = true }
sha2 = { workspace = true }
chrono = { workspace = true }
sqlx = { version = "0.8", default-features = false, features = ["runtime-tokio-rustls", "sqlite", "chrono", "macros", "migrate"] }
ed25519-dalek = { version = "=3.0.0-pre.7", features = ["rand_core"] }
rand = "0.10"
base64 = "0.22"
tower_governor = "0.8"
metrics = "0.24"
metrics-exporter-prometheus = { version = "0.18", default-features = false }
ct-merkle = { version = "0.3", features = ["serde"] }
tokio-util = { version = "0.7", features = ["rt"] }

[dev-dependencies]
tower = { version = "0.5", features = ["util", "limit"] }
http-body-util = "0.1"
nucleus-lineage = { path = "../nucleus-lineage", features = ["insecure-local-issuer"] }
nucleus-control-plane = { path = "../nucleus-control-plane" }
# `sign` lets the route test mint a SignedAgentCard to seed AppState.
nucleus-agent-card = { path = "../nucleus-agent-card", features = ["sign"] }
nucleus-identity = { path = "../nucleus-identity" }
ring = { workspace = true }

[lints]
workspace = true

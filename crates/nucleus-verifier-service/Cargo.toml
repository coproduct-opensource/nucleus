[package]
name = "nucleus-verifier-service"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Public verifier-as-a-service for nucleus provenance bundles"
repository = "https://github.com/coproduct-opensource/nucleus"
readme = "README.md"
keywords = ["verifier", "provenance", "ifc", "transparency", "audit"]
categories = ["web-programming::http-server"]

[[bin]]
name = "nucleus-verifier-service"
path = "src/main.rs"

[dependencies]
nucleus-envelope = { path = "../nucleus-envelope" }
nucleus-lineage = { path = "../nucleus-lineage" }
nucleus-agent-card = { path = "../nucleus-agent-card" }
# Creditworthiness: price an agent's bond from its receipts (POST /v1/credit).
# `nucleus-recompute` supplies the ClearingReceipt request type; the credit file
# folds them (recompute each, honest builds standing, a caught lie burns it) and
# composes the proven required_bond. Stateless + recomputable client-side.
nucleus-recompute = { path = "../nucleus-recompute", features = ["envelope"] }
# The /v1/clearing/verify wire type is a signed nucleus-receipt Receipt envelope.
nucleus-receipt = { path = "../nucleus-receipt" }
# `persist`: the durable, append-only credit ledger (redb-backed store) powering
# the stateful /v1/credit/{agent_id}/accrue + GET standing endpoints. The
# stateless POST /v1/credit and the mint bridge stay on (default features kept).
nucleus-creditworthiness = { path = "../nucleus-creditworthiness", features = ["persist"] }
axum = { version = "0.8", features = ["macros", "json"] }
tokio = { workspace = true, features = ["full"] }
tower = { version = "0.5", features = ["util", "limit"] }
tower-http = { version = "0.7", features = ["trace", "timeout", "cors", "limit", "catch-panic"] }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
nucleus-otel-bootstrap = { path = "../nucleus-otel-bootstrap" }
clap = { workspace = true }
hex = { workspace = true }
sha2 = { workspace = true }
chrono = { workspace = true }
sqlx = { version = "0.8", default-features = false, features = ["runtime-tokio-rustls", "sqlite", "chrono", "macros", "migrate"] }
ed25519-dalek = { version = "=3.0.0-pre.7", features = ["rand_core"] }
rand = "0.10"
base64 = "0.22"
tower_governor = "0.8"
metrics = "0.24"
metrics-exporter-prometheus = { version = "0.18", default-features = false }
ct-merkle = { version = "0.3", features = ["serde"] }
tokio-util = { version = "0.7", features = ["rt"] }

[dev-dependencies]
tower = { version = "0.5", features = ["util", "limit"] }
http-body-util = "0.1"
# R2 e2e: mint a signed clearing receipt to POST at /v1/clearing/verify
# (nucleus-receipt is a regular dep above; ed25519-dalek only the test needs).
ed25519-dalek = { workspace = true }
nucleus-lineage = { path = "../nucleus-lineage", features = ["insecure-local-issuer"] }
nucleus-control-plane = { path = "../nucleus-control-plane" }
# `sign` lets the route test mint a SignedAgentCard to seed AppState.
nucleus-agent-card = { path = "../nucleus-agent-card", features = ["sign"] }
ring = { workspace = true }
# Build genuinely-honest receipts in the /v1/credit test (so a Match is real,
# not asserted) via the same proven kernels recompute checks against.
nucleus-econ-kernels = { path = "../nucleus-econ-kernels" }
# Temp paths for the durable-credit-ledger integration tests (open → accrue →
# reopen at the same path → standing survives).
tempfile = { workspace = true }

[lints]
workspace = true

[package]
name = "nucleus"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "OS-level enforcement of portcullis permissions - wraps file, process, and network APIs"
repository = "https://github.com/coproduct-opensource/nucleus"
documentation = "https://docs.rs/nucleus"
readme = "README.md"
keywords = ["ai", "security", "sandbox", "agents", "enforcement"]
categories = ["os", "filesystem", "command-line-utilities"]

[features]
default = []
# Enable async runtime support. Pulls in the sealed async spawn home
# (`AsyncShellSpawnEffect::run_argv_async`) by enabling portcullis-effects' own
# `async` feature, so the Executor's `run_with_timeout*` can delegate to it.
async = ["tokio", "portcullis-effects/async"]

[dependencies]
nucleus-provenance = { path = "../nucleus-provenance" }
# Policy layer - the quotient lattice
portcullis = { path = "../portcullis" }
# Sealed effects home (brick B1's `ShellEffect::run_argv`). The Executor's
# synchronous spawn is relocated behind this discharge-gated effect API (B2), so
# the raw `Command::new` leaves `command.rs`. No cycle: portcullis-effects does
# not depend on nucleus.
portcullis-effects = { path = "../portcullis-effects" }
# Sealed discharge proof: the `DischargedBundle` type is named in the Executor
# spawn signature (`spawn_checked`/`run`/`run_args`/…) so no synchronous spawn can
# compile without a minted preflight bundle. Additive — discharge is already
# trusted (defined in this crate, re-exported through portcullis-core → portcullis,
# hence already a transitive dependency; it is dependency-free so no cycle). This
# adds no new TCB, only names the existing proof type.
nucleus-ifc-kernel = { path = "../nucleus-ifc-kernel", version = "1.0.0" }

# Atomic budget tracking
parking_lot = "0.12"

# Approval token signing and nonces
hmac = { workspace = true }
sha2 = { workspace = true }
hex = { workspace = true }
uuid = { workspace = true }

# Monotonic time (not wall clock)
quanta = "0.12"

# Secure path handling
cap-std = "4"          # Capability-based filesystem
cap-tempfile = "4"     # Secure temp files

# Error handling
thiserror = { workspace = true }

# Structured audit logging (isolation downgrade warnings, most-paranoid #2)
tracing = { workspace = true }

# Optional: async support
tokio = { workspace = true, features = ["process", "fs", "io-util", "time"], optional = true }

# Shell parsing for command validation
shell-words = { workspace = true }

# Linux-only guest hardening: no-new-privs + rlimits via pre_exec (most-paranoid #2).
# (seccomp-bpf / Landlock are a tracked follow-up requiring Linux CI validation.)
[target.'cfg(target_os = "linux")'.dependencies]
libc = "0.2"

[dev-dependencies]
tempfile = { workspace = true }
rust_decimal = { workspace = true }
# Test-only: a runtime + `#[tokio::test]` for the async `run_with_timeout*`
# behavior-preservation tests (gated behind the `async` feature at the test
# site). Feature-unioned with the optional `tokio` dependency above under
# `--all-features`; harmless when `async` is off (the tests don't compile).
tokio = { workspace = true, features = ["macros", "rt", "rt-multi-thread"] }

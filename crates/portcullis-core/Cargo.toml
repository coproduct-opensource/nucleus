[package]
name = "portcullis-core"
version = "1.0.0"
edition = "2024"
license = "MIT"
description = "Core capability lattice types — dependency-free for Aeneas verification"
repository = "https://github.com/coproduct-opensource/nucleus"

# This crate is the source of truth for CapabilityLattice (the 13-dimension
# product policy). Its scalar CapabilityLevel and the IFC reference monitor were
# carved into `nucleus-ifc-kernel` (MVK M3) and are re-exported here.
# The verification target: Aeneas (Rust MIR → Lean 4) translates this crate
# into pure functional Lean code, where we prove HeytingAlgebra properties
# against Mathlib (the Lean proofs live in `lean/`).
#
# By default this crate is dependency-free for Aeneas translation.
# The optional `serde` feature enables serialization support when used
# by the production `portcullis` crate (Aeneas ignores feature flags).

[features]
default = []
serde = ["dep:serde", "dep:toml", "nucleus-ifc-kernel/serde"]
attestation = ["dep:sha2"]
artifact = ["dep:serde", "dep:serde_json", "dep:sha2"]
c2pa-manifest = ["dep:c2pa", "artifact"]
envelope = ["dep:sha2"]
wasm-sandbox = ["dep:wasmtime", "dep:sha2"]
zkvm = ["dep:risc0-zkvm", "dep:serde", "dep:serde_json", "dep:sha2"]

[dependencies]
# The IFC admission core — carved out of this crate in MVK M3. Re-exported below
# so every `portcullis_core::{IFCLabel, Operation, CapabilityLevel, flow, …}` path
# keeps resolving. `default-features = false` keeps it dependency-free unless this
# crate's `serde` feature forwards `nucleus-ifc-kernel/serde`.
nucleus-ifc-kernel = { path = "../nucleus-ifc-kernel", version = "1.0.0", default-features = false }
serde = { version = "1", features = ["derive"], optional = true }
toml = { workspace = true, optional = true }
sha2 = { workspace = true, optional = true }
serde_json = { workspace = true, optional = true }
wasmtime = { version = "46", optional = true }
c2pa = { workspace = true, optional = true }
risc0-zkvm = { workspace = true, optional = true }

[dev-dependencies]
wat = "1"

[lints.rust]
unexpected_cfgs = { level = "allow", check-cfg = ['cfg(kani)'] }

[dev-dependencies.ck-types]
# Parity pin for the constitutional attenuation instance
# (tests/constitutional_attenuation.rs). DEV-ONLY by design: the
# minimal verified kernel (ck-*) must not depend on this crate, and
# this crate's production graph stays dependency-free for Aeneas.
path = "../ck-types"

[dev-dependencies.ck-policy]
path = "../ck-policy"

[package]
name = "portcullis-effects"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Sealed effect traits — I/O only through policy-enforced channels"
repository = "https://github.com/coproduct-opensource/nucleus"
readme = "README.md"
keywords = ["ai", "security", "effects", "permissions", "agents"]
categories = ["development-tools", "authentication"]

[features]
default = []
# Enable the tokio-based async spawn (`ShellEffect::run_argv_async`). Keeps the
# default crate free of the tokio dependency.
async = ["dep:tokio"]
# Enable the sealed agent net-egress effect (`NetEffect::fetch`, the real
# reqwest HTTP send behind the `_proof`-gated, PolicyEnforced API — B5). Kept
# behind its own feature so the default crate and the async-spawn consumers
# (nucleus core) do not pull the reqwest HTTP stack.
net = ["dep:reqwest"]

[dependencies]
portcullis-core = { path = "../portcullis-core" }
nucleus-provenance-memory = { path = "../nucleus-provenance-memory" }
ed25519-dalek = { workspace = true }
shell-words = { workspace = true }
regex = { workspace = true }
tokio = { workspace = true, features = ["process", "io-util", "time"], optional = true }
reqwest = { workspace = true, optional = true }

[dev-dependencies]
tempfile = { workspace = true }
proptest = { workspace = true }
tokio = { workspace = true, features = ["rt", "macros"] }
# Test-only: install a rustls crypto provider before building a reqwest Client
# in the `net` policy-gate test (the workspace reqwest uses `rustls-no-provider`
# under feature unification, so a provider must be installed first).
rustls = { workspace = true }

[lints]
workspace = true

[package]
name = "portcullis"
version = "1.0.0"
edition = "2021"
rust-version = "1.80"
license = "MIT OR Apache-2.0"
description = "A quotient lattice for AI agent permissions that prevents the 'uninhabitable state'"
repository = "https://github.com/coproduct-opensource/nucleus"
documentation = "https://docs.rs/portcullis"
readme = "README.md"
keywords = ["ai", "security", "permissions", "agents", "lattice"]
categories = ["authentication", "development-tools"]

[features]
default = ["serde", "crypto"]
serde = ["dep:serde", "dep:serde_json", "rust_decimal/serde", "chrono/serde", "uuid/serde"]

# Ed25519 signing (ring) — disable for WASM targets where ring can't compile
crypto = ["dep:ring"]

# CEL-based policy constraints
cel = ["dep:cel-interpreter"]

# Policy specification loading (YAML/TOML)
spec = ["dep:serde_yaml", "dep:toml", "serde", "cel"]

# Webhook audit backend for SIEM delivery
webhook = ["dep:reqwest", "dep:tokio", "serde"]

# Remote append-only audit sink (S3-compatible: AWS S3, MinIO, R2, Tigris)
remote-audit = ["dep:aws-sdk-s3", "dep:aws-config", "dep:tokio", "serde"]

# Cedar policy language integration (CNCF Sandbox project)
cedar = ["dep:cedar-policy", "serde"]

# SECURITY: Enable this feature ONLY for testing. It exposes methods that
# bypass security constraints (e.g., disabling uninhabitable state enforcement).
# DO NOT enable in production builds.
testing = []

[dependencies]
portcullis-core = { path = "../portcullis-core", features = ["serde"] }
chrono = { workspace = true }
hex = { workspace = true }
hmac = { workspace = true }
sha2 = { workspace = true }
uuid = { workspace = true }
tracing = { workspace = true }

# Optional serde support
serde = { workspace = true, optional = true }
serde_json = { workspace = true, optional = true }

# Ed25519 signatures for attested delegation certificates (optional for WASM)
ring = { workspace = true, optional = true }

# Base64 encoding for compact token transport
base64 = { workspace = true }

# Security: proper decimal arithmetic for budget (no f64 exploits)
rust_decimal = { workspace = true }

# Security: proper shell command parsing (no injection via quoting)
shell-words = { workspace = true }

# Glob pattern matching (audited, stable)
regex = { workspace = true }

# CEL expression evaluation (optional, for user-defined nuclei)
cel-interpreter = { version = "0.10", optional = true }

# Cedar policy language (CNCF Sandbox — human-readable, analyzable policies)
cedar-policy = { version = "4", optional = true }

# Policy specification parsing (optional)
serde_yaml = { workspace = true, optional = true }
toml = { workspace = true, optional = true }

# Webhook audit backend (optional)
reqwest = { workspace = true, features = ["json", "rustls-no-provider"], optional = true }
tokio = { workspace = true, features = ["rt"], optional = true }

# Remote audit sink (optional, S3-compatible)
aws-sdk-s3 = { workspace = true, optional = true }
aws-config = { workspace = true, optional = true }

[dev-dependencies]
proptest = { workspace = true }
serde_json = { workspace = true }
tempfile = { workspace = true }
kani = "0.0.1"

[[test]]
name = "example_policies"
required-features = ["spec"]

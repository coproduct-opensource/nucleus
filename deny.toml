# Scope the dependency scan to the platforms nucleus actually builds and ships
# (native CLI + services). Without this, cargo-deny evaluates ALL targets,
# including wasm32 — which pulls iroh-relay's browser-only WebSocket shim
# (ws_stream_wasm/pharos/async_io_stream, licensed "Unlicense"). Those crates
# are NEVER compiled in any native nucleus artifact (they sit under
# iroh-relay's `cfg(target_family="wasm")` deps), so this is a scope correction,
# NOT a license-policy relaxation — "Unlicense" is deliberately NOT added to the
# [licenses] allow-list below. The WASM verifier (sdks/verifier-js) is a
# separate crate that does not depend on iroh.
[graph]
targets = [
  "x86_64-unknown-linux-gnu",
  "aarch64-unknown-linux-gnu",
  "x86_64-apple-darwin",
  "aarch64-apple-darwin",
]

[advisories]
version = 2
# See https://github.com/RustSec/advisory-db
ignore = [
  # rsa Marvin Attack — no fix available upstream.
  # Transitive via c2pa-rs. Not exploitable: we use c2pa for content
  # credential assertions, not RSA key operations.
  "RUSTSEC-2023-0071",

  # tracing-subscriber ANSI escape — transitive via risc0-zkvm → ark-relations.
  # Feature-gated behind `zkvm`, not in default build.
  "RUSTSEC-2025-0055",

  # rand unsoundness via custom logger calling rand::rng() (Stacked Borrows).
  # Direct deps bumped to patched versions; only remaining usage is transitive
  # rand 0.8.5 via rust_decimal/ruint — upstream has not released a patched
  # version. Not exploitable here: no custom logger in these deps calls rand::rng().
  "RUSTSEC-2026-0097",

  # rustls-webpki 0.101.x URI name-constraint / wildcard-name vulns (2026-04-14).
  # Transitive via aws-smithy-http-client 1.1.12 → rustls 0.21 → rustls-webpki 0.101.
  # AWS SDK fix path: BehaviorVersion v2025_01_17+ (hyper 1.x + rustls 0.23).
  # Tracked separately; AWS path does not process attacker-controlled certs.
  "RUSTSEC-2026-0098",
  "RUSTSEC-2026-0099",

  # rustls-webpki 0.101.7 reachable panic in CRL parsing.
  # Active dep tree uses rustls-webpki 0.103.13 (already patched, see Cargo.lock).
  # The 0.101.7 entry is an orphaned lockfile residue from the same
  # aws-smithy-http-client 1.1.12 / tokio-rustls 0.24.1 chain that
  # 2026-0098/0099 cover; `cargo tree --invert -p rustls-webpki@0.101.7`
  # finds no active path. Will drop on next AWS SDK BehaviorVersion bump.
  "RUSTSEC-2026-0104",

  # wasmtime 43.0.1 panic on oversize table allocation (RUSTSEC-2026-0114).
  # Behind portcullis-core's `wasm-sandbox` feature, not in any default build.
  # No untrusted .wasm execution path is wired in production today.
  # Sunset: bump to wasmtime 44+ (tracked in dependabot PR #1600).
  "RUSTSEC-2026-0114",

  # bincode 1.x is unmaintained (RUSTSEC-2025-0141) — informational, NOT a
  # vulnerability. bincode 1.3.3 is pulled TRANSITIVELY via risc0-zkvm 3.0.5 →
  # portcullis-core (behind the `zkvm` feature, surfaced under deny's
  # `--all-features` scan); not removable without dropping risc0. Our own code
  # does NOT depend on it — the nucleus-witness-gossip wire codec uses the
  # maintained `postcard`. Sunset: drops when risc0-zkvm moves off bincode 1.
  "RUSTSEC-2025-0141",

  # quick-xml 0.39.4 quadratic runtime on duplicate XML attribute names.
  # Transitive via plist<-netdev<-netwatch<-iroh; no patched path exists
  # (plist 1.9.0 pins ^0.39). Exposure is macOS network-interface plist
  # parsing, not attacker-controlled XML. REVISIT when plist releases >1.9.0.
  "RUSTSEC-2026-0194",
]
# These are informational; scope to workspace dependencies.
unmaintained = "workspace"
unsound = "workspace"
yanked = "warn"

[bans]
multiple-versions = "warn"
wildcards = "warn"
deny = []

[licenses]
# Allow common permissive licenses.
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CDLA-Permissive-2.0",
  "ISC",
  "MPL-2.0",
  "OpenSSL",
  "Unicode-3.0",
  "Zlib",
]
confidence-threshold = 0.93

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

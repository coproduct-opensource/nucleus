[advisories]
version = 2
# See https://github.com/RustSec/advisory-db
ignore = [
  # rsa Marvin Attack — no fix available upstream.
  # Transitive via c2pa-rs. Not exploitable: we use c2pa for content
  # credential assertions, not RSA key operations.
  "RUSTSEC-2023-0071",

  # proc-macro-error unmaintained — no security impact.
  # Transitive via c2pa-rs → iref → static-regular-grammar.
  "RUSTSEC-2024-0370",
]
# These are informational; scope to workspace dependencies.
unmaintained = "workspace"
unsound = "workspace"
yanked = "warn"

[bans]
multiple-versions = "warn"
wildcards = "warn"
deny = []

[licenses]
# Allow common permissive licenses.
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CDLA-Permissive-2.0",
  "ISC",
  "MPL-2.0",
  "OpenSSL",
  "Unicode-3.0",
  "Zlib",
]
confidence-threshold = 0.93

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
# Read-only access to the cross-language golden vectors (the single source shared
# with the Lean / Rust / WASM readers), which live outside the Foundry root. Lets
# SettlementGolden.t.sol read settlement.json via vm.readFile — completing the
# seal's Solidity arm (gap G3).
fs_permissions = [{ access = "read", path = "../../../crates/nucleus-econ-kernels/tests/golden" }]

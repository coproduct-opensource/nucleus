#  Uninhabitable state Demonstration Policy
#
# This policy demonstrates the "uninhabitable state" constraint:
#   1. Private data access (read_files)
#   2. Untrusted content (web_fetch)
#   3. Exfiltration capability (git_push, create_pr)
#
# When all three are present, the exfiltration operations
# require explicit approval - even if individually allowed.
#
# The uninhabitable state constraint is ALWAYS enforced by default.
# This policy adds additional contextual constraints.

name: uninhabitable-demo
description: Demonstrates the uninhabitable state security model

# This is true by default, shown explicitly for documentation
enforce_uninhabitable: true

constraints:
  # Explicit approval when uninhabitable state is detected
  - name: uninhabitable-warning
    description: Extra logging when uninhabitable state detected
    condition: |
      state_risk == "complete"
    obligations:
      - git_push
      - create_pr

  # Medium risk still warrants caution
  - name: uninhabitable state-medium-warning
    description: Approval for network when uninhabitable state building up
    condition: |
      state_risk == "medium" &&
      (operation == "web_fetch" || operation == "web_search")
    obligations:
      - web_fetch
      - web_search

  # Approval already granted unlocks operations
  - name: approval-bypass
    description: Skip constraints if human approved
    condition: |
      has_approval && state_risk != "complete"
    obligations: []

[package]
name = "x402-sepolia-bootstrap"
version = "0.0.0"
edition = "2021"
publish = false
description = "30-second x402 bootstrap on Base Sepolia (testnet) with the nucleus IFC gate + receipt on the paid route"

# Standalone workspace: keeps the heavy alloy / x402-rs dependency tree out of
# the main nucleus workspace + CI. Build it from this directory.
[workspace]

[[bin]]
name = "seller"
path = "src/bin/seller.rs"

[[bin]]
name = "buyer"
path = "src/bin/buyer.rs"

[dependencies]
# x402 payment rail (Rust SDK) — Base Sepolia testnet.
x402-axum = "1.5"
x402-reqwest = "1.5"
# `server` → V1Eip155Exact::price_tag (seller); `client` → V1Eip155ExactClient (buyer).
x402-chain-eip155 = { version = "1.5", features = ["server", "client"] }
x402-types = "1.5"
alloy-primitives = "1"
alloy-signer-local = "2"

axum = "0.8"
# Must match x402-reqwest's reqwest (0.13) so `Client` is the same type the
# `.with_payments()` middleware is implemented for.
reqwest = { version = "0.13", default-features = false, features = ["rustls", "http2", "charset"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
serde_json = "1"
anyhow = "1"

# The nucleus trust layer that makes this more than a plain x402 paywall:
# the IFC gate + signed receipt on the paid route.
nucleus-verify-commerce = { path = "../../crates/nucleus-verify-commerce" }

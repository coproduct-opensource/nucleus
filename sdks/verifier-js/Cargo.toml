[package]
name = "nucleus-verifier-wasm"
version = "0.1.0"
edition = "2021"
rust-version = "1.95"
license = "MIT OR Apache-2.0"
description = "WASM bindings for nucleus-envelope verification — runs in browser/Node, no trust in the verifier service"
repository = "https://github.com/coproduct-opensource/nucleus"
publish = false

# cdylib = wasm module; rlib = also a normal Rust lib so we can write
# Rust integration tests against the same code (wasm-bindgen-test
# exposes #[wasm_bindgen_test] for browser-targeted tests).
[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
nucleus-envelope = { path = "../../crates/nucleus-envelope" }
nucleus-lineage = { path = "../../crates/nucleus-lineage" }
# The IFC decision (wasm-safe, feature-gated) — lets the SDK RE-DERIVE the
# in-bounds verdict, not just check signatures. Same code the production gate runs.
nucleus-ifc = { path = "../../crates/nucleus-ifc", features = ["decision"] }
# Proven clearing/settlement/commons kernels — lets the SDK RE-DERIVE the cleared
# price (VCG + Pigou), the settlement split, and the externality→commons routing.
nucleus-econ-kernels = { path = "../../crates/nucleus-econ-kernels" }
# verify_receipt: re-derive every cleared number from a receipt's declared inputs
# via the proven kernels, in-browser. The keystone recompute, callable by anyone.
nucleus-recompute = { path = "../../crates/nucleus-recompute" }
nucleus-externality = { path = "../../crates/nucleus-externality" }
# Bonding: lets the SDK compute the recompute-slashed required bond from an
# agent's defection exposure + its verified reputation (the proven
# reputation↔capital substitution). No new trust — pure proven arithmetic.
nucleus-witness-olog = { path = "../../crates/nucleus-witness-olog" }
# Creditworthiness: fold an agent's recompute-verified receipts into a credit
# file (honest builds standing, a caught lie burns it) and price its bond — the
# whole receipt→recompute→credit-file→bond flywheel, in-browser. Default
# features include the `recompute` mint bridge.
nucleus-creditworthiness = { path = "../../crates/nucleus-creditworthiness" }
wasm-bindgen = "0.2"
serde-wasm-bindgen = "0.6"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# `wasmbind` makes chrono::Utc::now() use js-sys::Date::now() — required
# for any code that hits the clock when targeting wasm32-unknown-unknown.
# Defensive even though our verify path doesn't itself call now().
chrono = { version = "0.4", default-features = false, features = ["serde", "wasmbind", "clock"] }
# `js` feature on getrandom routes it through Crypto.getRandomValues —
# needed because ed25519-dalek pulls getrandom transitively. Without
# this, wasm32-unknown-unknown builds fail at link time.
getrandom = { version = "0.2", features = ["js"] }
# uuid is transitively required by nucleus-lineage; force the `js`
# feature so its `compile_error!` for wasm32-unknown-unknown is
# satisfied. We don't actually call any uuid functions in the verify
# path, but the feature must be active for the dep tree to resolve.
uuid = { version = "1", features = ["v4", "js"] }
hex = "0.4"
console_error_panic_hook = { version = "0.1", optional = true }

[features]
default = ["console_error_panic_hook"]

[dev-dependencies]
wasm-bindgen-test = "0.3"
